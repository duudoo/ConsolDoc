version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: consoldoc_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=consoldoc
      - DB_USERNAME=consoldoc
      - DB_PASSWORD=secret

  postgres:
    image: postgres:14
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB=consoldoc
      POSTGRES_USER=consoldoc
      POSTGRES_PASSWORD=secret

volumes:
  pgdata:
